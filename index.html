<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Julius ja saksa keele mГјsteerium</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0efe8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem 3rem;
    }
    #root { width: 100%; max-width: 540px; }
    @keyframes jb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes js { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    .jb { animation: jb 0.65s ease infinite; display: inline-block; }
    .js { animation: js 0.40s ease; display: inline-block; }
    button { font-family: inherit; transition: filter 0.15s, transform 0.1s; }
    button:hover:not([disabled]) { filter: brightness(0.92); }
    button:active:not([disabled]) { transform: scale(0.97); }
    button[disabled] { opacity: 0.6; cursor: default; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
var ce = React.createElement;
var useState = React.useState;

var ROOMS = [
  {
    id: 0, title: "Tuba 1: Perekond", de: "Familie", emoji: "рҹҸ ",
    bg: "#EEEDFE", accent: "#534AB7", tc: "#26215C", badge: "#AFA9EC",
    intro: "Esimene tuba! Teema on PEREKOND вҖ“ Familie. Vali iga saksa sГөna jaoks Гөige eesti vaste. Vajuta рҹ’Ў kui jГӨГӨd hГӨtta!",
    qs: [
      { de: "die Mutter",    right: "ema",      opts: ["ema","tГӨdi","Гөde","vanaema"],       hint: "KГөlab nagu inglise 'mother'.",                      exp: "die Mutter = ema" },
      { de: "der Vater",     right: "isa",      opts: ["vend","isa","onu","papa"],           hint: "KГөlab nagu inglise 'father'.",                      exp: "der Vater = isa" },
      { de: "die Schwester", right: "Гөde",      opts: ["vanaema","ema","Гөde","sГөbranna"],   hint: "TГјdruk-sugulane, kes elab sinuga koos.",            exp: "die Schwester = Гөde" },
      { de: "der Bruder",    right: "vend",     opts: ["onu","nГөbu","papa","vend"],         hint: "Poiss-sugulane, kes elab sinuga koos.",             exp: "der Bruder = vend" },
      { de: "die Oma",       right: "vanaema",  opts: ["ema","vanaema","tГӨdi","sГөber"],     hint: "Emme emme vГөi papa emme вҖ“ vanem daam perekonnas!", exp: "die Oma = vanaema" }
    ]
  },
  {
    id: 1, title: "Tuba 2: Linn", de: "Stadt", emoji: "рҹҸҷпёҸ",
    bg: "#E1F5EE", accent: "#0F6E56", tc: "#04342C", badge: "#5DCAA5",
    intro: "Teine tuba! Teema on LINN вҖ“ Stadt. Saksa linnad on tГӨis huvitavaid kohti. Kas tunned neid?",
    qs: [
      { de: "der Bahnhof",    right: "raudteejaam", opts: ["lennujaam","raudteejaam","muuseum","kino"],  hint: "'Bahn' = raudtee + 'Hof' = koht.",        exp: "der Bahnhof = raudteejaam" },
      { de: "die Bibliothek", right: "raamatukogu", opts: ["raamatukogu","teater","restoran","park"],   hint: "Seal saab raamatuid tasuta laenutada.",    exp: "die Bibliothek = raamatukogu" },
      { de: "die BrГјcke",     right: "sild",        opts: ["torn","jГөgi","sild","vГӨrav"],               hint: "Гңhendab kaht kallast Гјle vee.",            exp: "die BrГјcke = sild" },
      { de: "der Zoo",        right: "loomaaed",    opts: ["park","jГӨrv","aed","loomaaed"],             hint: "Seal elavad lГөvid ja elevandid!",          exp: "der Zoo = loomaaed" },
      { de: "die Insel",      right: "saar",        opts: ["jГөgi","saar","jГӨrv","loss"],                hint: "Maa, mida igalt poolt Гјmbritseb vesi.",    exp: "die Insel = saar" }
    ]
  },
  {
    id: 2, title: "Tuba 3: Loomad", de: "Tiere", emoji: "рҹҗҫ",
    bg: "#FAEEDA", accent: "#854F0B", tc: "#412402", badge: "#EF9F27",
    intro: "Kolmas tuba! Teema on LOOMAD вҖ“ Tiere. Loe vihjeid ja arva, mis loom see on saksa keeles!",
    qs: [
      { de: "Minka on see loom. (kass)",          right: "die Katze",         opts: ["der Hund","die Katze","die Maus","der Vogel"],            hint: "Nurub ja tahab piima.",               exp: "die Katze = kass" },
      { de: "Kuldne loom, elab vees. (kala)",     right: "der Goldfisch",     opts: ["der Goldfisch","der Hamster","die SchildkrГ¶te","der Igel"],hint: "'Gold'=kuld + 'Fisch'=kala.",        exp: "der Goldfisch = kuldkala" },
      { de: "SГ¶Г¶vad porgandeid. (kГјГјlik)",        right: "das Kaninchen",     opts: ["das Schaf","die Ziege","das Kaninchen","das Pferd"],      hint: "Pikad kГөrvad ja hГјppab!",            exp: "das Kaninchen = kГјГјlik" },
      { de: "Aeglane, kodu seljas. (kilpkonn)",   right: "die SchildkrГ¶te",   opts: ["die SchildkrГ¶te","der Igel","die Maus","der Hamster"],    hint: "'Schild'=kilp. VГӨga aeglane!",       exp: "die SchildkrГ¶te = kilpkonn" },
      { de: "Laulab, vГӨike, kollane. (lind)",     right: "der Kanarienvogel", opts: ["der Vogel","der Kanarienvogel","das Schaf","die Ziege"],  hint: "'Vogel'=lind. Eriline laulev linnuke.", exp: "der Kanarienvogel = kanarialind" }
    ]
  },
  {
    id: 3, title: "Tuba 4: KoolipГӨev", de: "Schultag", emoji: "рҹҺ’",
    bg: "#FAECE7", accent: "#993C1D", tc: "#4A1B0C", badge: "#F0797B",
    intro: "Neljas ja VIIMANE tuba! Teema on KOOLIPГ„EV вҖ“ Schultag. Vabadus on lГӨhedal!",
    qs: [
      { de: "frГјhstГјcken",    right: "hommikusГ¶Г¶ki sГ¶Г¶ma", opts: ["lГөunat sГ¶Г¶ma","hommikusГ¶Г¶ki sГ¶Г¶ma","magama minema","kooli minema"],  hint: "'frГјh'=vara hommikul. Mida sГ¶Г¶d hommikul?", exp: "frГјhstГјcken = hommikusГ¶Г¶ki sГ¶Г¶ma" },
      { de: "der Bleistift",  right: "pliiats",            opts: ["kustukumm","vihik","pliiats","kГӨГӨrid"],                              hint: "'Blei'=plii + 'Stift'=kirjutusvahend.",    exp: "der Bleistift = pliiats" },
      { de: "die Pause",      right: "vahetund",           opts: ["tunnigraafik","vahetund","Гөppeaine","matemaatika"],                  hint: "Koolis on see aeg, aga ei ole tund!",       exp: "die Pause = vahetund" },
      { de: "aufstehen",      right: "voodist tГөusma",     opts: ["magama minema","riidesse panema","voodist tГөusma","hambaid pesema"], hint: "'auf'=Гјles + 'stehen'=seisma.",            exp: "aufstehen = voodist tГөusma" },
      { de: "die Hausaufgabe",right: "kodutГ¶Г¶",            opts: ["koolipГӨev","kodutГ¶Г¶","raamat","tunnigraafik"],                       hint: "'Haus'=kodu + 'Aufgabe'=Гјlesanne.",         exp: "die Hausaufgabe = kodutГ¶Г¶" }
    ]
  }
];

var PASS = 4;
var TOTALQ = 5;
var OKMSGS = ["SuurepГӨrane!", "TГӨpselt Гөige!", "Jaa! Nii see kГӨib!", "Perfekt!", "VГӨga hГӨsti!", "Klasse!"];

var C = {
  bg: "#ffffff",
  bgSec: "#f0efe8",
  text: "#1a1a1a",
  textSec: "#666",
  border: "rgba(0,0,0,0.1)",
  borderSec: "rgba(0,0,0,0.18)",
  okBg: "#eaf3de", okText: "#3b6d11", okBorder: "#639922",
  failBg: "#fcebeb", failText: "#a32d2d", failBorder: "#e24b4a"
};

function Julius(props) {
  var mood = props.mood;
  var msg = props.msg;
  var faces = { happy: "рҹҳ„", sad: "рҹҳҹ", excited: "рҹӨ©", thinking: "рҹӨ”", normal: "рҹҳҠ" };
  var face = faces[mood] || "рҹҳҠ";
  var anim = (mood === "excited" || mood === "happy") ? "jb" : mood === "sad" ? "js" : "";
  return ce("div", { style: { display:"flex", gap:12, alignItems:"flex-start", marginBottom:14 } },
    ce("div", { className: anim, style: { fontSize:40, lineHeight:1, flexShrink:0 } }, "рҹ‘»"),
    ce("div", { style: { background:C.bgSec, border:"1px solid "+C.border, borderRadius:"0 14px 14px 14px", padding:"10px 14px", flex:1, minWidth:0 } },
      ce("p", { style: { margin:"0 0 4px", fontSize:10, color:C.textSec, fontWeight:600, letterSpacing:"0.07em", textTransform:"uppercase" } }, face + " Julius rГӨГӨgib:"),
      ce("p", { style: { margin:0, fontSize:14, color:C.text, lineHeight:1.6 } }, msg)
    )
  );
}

function App() {
  var s1 = useState("intro");  var screen = s1[0];      var setScreen = s1[1];
  var s2 = useState(0);        var roomIdx = s2[0];     var setRoomIdx = s2[1];
  var s3 = useState(0);        var qIdx = s3[0];        var setQIdx = s3[1];
  var s4 = useState(0);        var score = s4[0];       var setScore = s4[1];
  var s5 = useState(null);     var ans = s5[0];         var setAns = s5[1];
  var s6 = useState(false);    var showHint = s6[0];    var setShowHint = s6[1];
  var s7 = useState([]);       var roomScores = s7[0];  var setRoomScores = s7[1];
  var s8 = useState(0);        var lastFinal = s8[0];   var setLastFinal = s8[1];
  var s9 = useState(0);        var okI = s9[0];         var setOkI = s9[1];

  var room = ROOMS[roomIdx];
  var q = room ? room.qs[qIdx] : null;

  function handleAnswer(opt) {
    if (ans) return;
    var ok = opt === q.right;
    var ns = score + (ok ? 1 : 0);
    setAns({ opt: opt, ok: ok });
    setShowHint(false);
    if (ok) setOkI(function(i) { return (i + 1) % OKMSGS.length; });
    setTimeout(function() {
      setAns(null);
      if (qIdx + 1 < TOTALQ) {
        setScore(ns);
        setQIdx(function(i) { return i + 1; });
      } else {
        setLastFinal(ns);
        setRoomScores(function(prev) { return prev.concat([ns]); });
        setScore(0);
        setScreen("roomResult");
      }
    }, 1800);
  }

  function goNext() {
    var n = roomIdx + 1;
    if (n < ROOMS.length) {
      setRoomIdx(n); setQIdx(0); setScore(0); setAns(null); setShowHint(false);
      setScreen("playing");
    } else {
      setScreen("victory");
    }
  }

  function retry() {
    setScore(0); setQIdx(0); setAns(null); setShowHint(false);
    setRoomScores(function(prev) { return prev.slice(0, -1); });
    setScreen("playing");
  }

  function restart() {
    setScreen("intro"); setRoomIdx(0); setQIdx(0); setScore(0);
    setAns(null); setShowHint(false); setRoomScores([]); setLastFinal(0);
  }

  // в”Җв”Җ INTRO в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if (screen === "intro") {
    var tips = [
      "рҹ”җ  Lahenda 4 saksa keele tuba",
      "вң…  Vali iga kГјsimuse jaoks Гөige eesti vaste",
      "рҹ’Ў  Vajuta vihjete nuppu, kui jГӨГӨd hГӨtta",
      "рҹ—қпёҸ  Vaja 4/5 Гөiget vastust, et uks avaneks",
      "рҹ”„  EbaГөnnestumise korral saad uuesti proovida"
    ];
    return ce("div", { style: { paddingTop:"1rem" } },
      ce("div", { style: { textAlign:"center", marginBottom:20 } },
        ce("div", { className:"jb", style: { fontSize:64, lineHeight:1, marginBottom:10, display:"inline-block" } }, "рҹ‘»"),
        ce("h1", { style: { fontSize:22, fontWeight:700, margin:"0 0 8px", color:C.text } }, "Julius ja saksa keele mГјsteerium"),
        ce("span", { style: { background:"#EEEDFE", border:"1.5px solid #AFA9EC", borderRadius:6, padding:"3px 12px", fontSize:11, fontWeight:600, color:"#26215C" } }, "Saksa keel A1 В· PГөgenemismГӨng")
      ),
      ce(Julius, { mood:"excited", msg:"Tere! Mina olen Julius вҖ“ selle vana maja vaim! Olen siin 100 aastat kinni olnud. Ainult saksa keele teadmised saavad mind vabastada! Kas sa aitad mind? рҹ—қпёҸ" }),
      ce("div", { style: { background:C.bgSec, borderRadius:10, padding:"14px 16px", marginBottom:16 } },
        ce("p", { style: { margin:"0 0 10px", fontSize:14, fontWeight:600, color:C.text } }, "Kuidas mГӨngida:"),
        tips.map(function(t, i) { return ce("p", { key:i, style: { margin:"4px 0", fontSize:13, color:C.textSec } }, t); })
      ),
      ce("div", { style: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:22 } },
        ROOMS.map(function(r) {
          return ce("div", { key:r.id, style: { background:r.bg, border:"1.5px solid "+r.badge, borderRadius:10, padding:"12px 14px" } },
            ce("div", { style: { fontSize:24 } }, r.emoji),
            ce("p", { style: { margin:"6px 0 2px", fontSize:13, fontWeight:600, color:r.tc } }, r.title),
            ce("p", { style: { margin:0, fontSize:11, color:r.accent } }, r.de)
          );
        })
      ),
      ce("div", { style: { textAlign:"center" } },
        ce("button", {
          onClick: function() { setScreen("playing"); },
          style: { background:"#534AB7", color:"#fff", border:"none", borderRadius:10, padding:"14px 32px", fontSize:16, fontWeight:600, cursor:"pointer" }
        }, "Aita Juliust! вҶ’")
      )
    );
  }

  // в”Җв”Җ PLAYING в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if (screen === "playing" && q) {
    var pct = (qIdx / TOTALQ) * 100;
    var jMood, jMsg;
    if (ans) {
      jMood = ans.ok ? "happy" : "sad";
      if (ans.ok) {
        jMsg = OKMSGS[okI];
      } else {
        jMsg = "Kahjuks vale! Г•ige vastus on вҖһ" + q.right + "". (" + q.exp + ") Proovi jГӨrgmist!";
      }
    } else if (showHint) {
      jMood = "thinking";
      jMsg = "рҹ’Ў Vihje: " + q.hint;
    } else if (qIdx === 0) {
      jMood = "excited";
      jMsg = room.intro;
    } else if (qIdx === 2) {
      jMood = "normal";
      jMsg = "Pool teed tehtud! JГӨtka, lГӨheb hГӨsti! рҹ’Ә";
    } else {
      jMood = "normal";
      jMsg = "KГјsimus " + (qIdx + 1) + "/" + TOTALQ + ". Vali Гөige eesti vaste!";
    }

    var optBtns = q.opts.map(function(opt, i) {
      var bg = C.bg;
      var brd = "1px solid " + C.border;
      var col = C.text;
      if (ans) {
        if (opt === q.right) { bg = C.okBg; brd = "1.5px solid " + C.okBorder; col = C.okText; }
        else if (opt === ans.opt && !ans.ok) { bg = C.failBg; brd = "1.5px solid " + C.failBorder; col = C.failText; }
      }
      return ce("button", {
        key: i,
        onClick: function() { handleAnswer(opt); },
        disabled: !!ans,
        style: { background:bg, border:brd, borderRadius:9, padding:"13px 10px", fontSize:14, color:col, fontWeight:500, lineHeight:1.3, cursor:ans?"default":"pointer", width:"100%", textAlign:"center" }
      }, opt);
    });

    return ce("div", { style: { paddingTop:"0.5rem" } },
      ce("div", { style: { display:"flex", alignItems:"center", gap:10, marginBottom:14 } },
        ce("span", { style: { fontSize:24 } }, room.emoji),
        ce("div", { style: { flex:1 } },
          ce("p", { style: { margin:0, fontWeight:600, fontSize:14, color:C.text } }, room.title),
          ce("div", { style: { background:"rgba(0,0,0,0.08)", height:6, borderRadius:3, marginTop:5, overflow:"hidden" } },
            ce("div", { style: { width:pct+"%", height:"100%", background:room.accent, borderRadius:3, transition:"width 0.5s ease" } })
          )
        ),
        ce("span", { style: { fontSize:12, color:C.textSec, minWidth:36, textAlign:"right" } }, (qIdx+1)+"/"+TOTALQ)
      ),
      ce(Julius, { mood:jMood, msg:jMsg }),
      ce("div", { style: { background:room.bg, border:"1.5px solid "+room.badge, borderRadius:14, padding:"22px 18px", textAlign:"center", marginBottom:14 } },
        ce("p", { style: { fontSize:10, color:room.accent, margin:"0 0 10px", fontWeight:600, letterSpacing:"0.08em", textTransform:"uppercase" } }, "Saksa keeles:"),
        ce("p", { style: { fontSize:24, fontWeight:700, color:room.tc, margin:0, lineHeight:1.3 } }, q.de)
      ),
      ce("div", { style: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:9, marginBottom:12 } }, optBtns),
      ce("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center" } },
        ce("button", {
          onClick: function() { setShowHint(function(h) { return !h; }); },
          disabled: !!ans,
          style: { background:"transparent", border:"1px solid "+C.border, borderRadius:8, padding:"7px 14px", fontSize:12, color:showHint?room.accent:C.textSec, cursor:"pointer" }
        }, showHint ? "Peida vihje" : "рҹ’Ў Vihje"),
        ce("span", { style: { fontSize:12, color:C.textSec } }, "вң“ " + score + " Гөiget")
      )
    );
  }

  // в”Җв”Җ ROOM RESULT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if (screen === "roomResult") {
    var passed = lastFinal >= PASS;
    var isLast = roomIdx >= ROOMS.length - 1;
    var nextRoom = ROOMS[roomIdx + 1];
    var stars = lastFinal === 5 ? "вӯҗвӯҗвӯҗ" : lastFinal >= 4 ? "вӯҗвӯҗ" : "вӯҗ";
    var rTitle = passed ? (lastFinal === 5 ? "TГӨiuslik tulemus!" : "Uks on avatud!") : "Uks jГӨi lukkuвҖҰ";
    var rMsg;
    if (passed) {
      if (isLast) {
        rMsg = "SA TEGID SEDA! KГөik 4 tuba lahendatud! Vabadus on kГӨes! рҹҺү";
      } else {
        rMsg = "Tuba avatud! KRГ•Г•Г•KS! рҹ—қпёҸ" + (nextRoom ? " JГӨrgmine: " + nextRoom.title + " (" + nextRoom.de + ")!" : "");
      }
    } else {
      rMsg = "Hmm, uks ei avane... Vaja on vГӨhemalt " + PASS + "/5 Гөiget. Proovi uuesti!";
    }
    var actionBtn;
    if (passed) {
      actionBtn = ce("button", {
        onClick: isLast ? function() { setScreen("victory"); } : goNext,
        style: { background:room.accent, color:"#fff", border:"none", borderRadius:10, padding:"13px 28px", fontSize:15, fontWeight:600, cursor:"pointer" }
      }, isLast ? "Vaata tulemust рҹҸҶ" : "JГӨrgmine tuba вҶ’");
    } else {
      actionBtn = ce("button", {
        onClick: retry,
        style: { background:C.bgSec, color:C.text, border:"1px solid "+C.borderSec, borderRadius:10, padding:"13px 28px", fontSize:15, fontWeight:600, cursor:"pointer" }
      }, "Proovi uuesti рҹ”„");
    }
    return ce("div", { style: { textAlign:"center", paddingTop:"2rem" } },
      ce("div", { className:passed?"jb":"js", style: { fontSize:56, marginBottom:14, display:"inline-block" } }, passed ? "рҹ”“" : "рҹ”’"),
      ce("h2", { style: { fontSize:20, fontWeight:700, margin:"0 0 16px", color:C.text } }, rTitle),
      ce(Julius, { mood:passed?"happy":"sad", msg:rMsg }),
      ce("div", { style: { display:"inline-block", background:passed?C.okBg:C.failBg, border:"1.5px solid "+(passed?C.okBorder:C.failBorder), borderRadius:10, padding:"10px 24px", marginBottom:22 } },
        ce("span", { style: { fontSize:18, fontWeight:700, color:passed?C.okText:C.failText } }, lastFinal+"/"+TOTALQ+"  "+stars)
      ),
      ce("div", null, actionBtn)
    );
  }

  // в”Җв”Җ VICTORY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if (screen === "victory") {
    var total = roomScores.reduce(function(a, b) { return a + b; }, 0);
    var max = ROOMS.length * TOTALQ;
    var vpct = Math.round((total / max) * 100);
    var medal = vpct === 100 ? "рҹҘҮ" : vpct >= 80 ? "рҹҘҲ" : "рҹҘү";
    var vmsg;
    if (vpct === 100) { vmsg = "TГӨiuslik! Oled tГөeline saksa keele meister!"; }
    else if (vpct >= 80) { vmsg = "VГӨga tubli! Saksa keel lГӨheb hГӨsti!"; }
    else { vmsg = "Hea tГ¶Г¶! Harjuta veel ja saad veelgi paremaks!"; }
    var vCards = ROOMS.map(function(r, i) {
      var rs = roomScores[i] || 0;
      var st = rs === 5 ? "вӯҗвӯҗвӯҗ" : rs >= 4 ? "вӯҗвӯҗ" : "вӯҗ";
      return ce("div", { key:i, style: { background:r.bg, border:"1.5px solid "+r.badge, borderRadius:10, padding:"12px 14px", textAlign:"left" } },
        ce("p", { style: { margin:0, fontSize:12, fontWeight:600, color:r.tc } }, r.emoji + " " + r.title),
        ce("p", { style: { margin:"4px 0 0", fontSize:20, fontWeight:700, color:r.accent } },
          rs + "/5  ",
          ce("span", { style: { fontSize:12, fontWeight:400, color:r.tc } }, st)
        )
      );
    });
    return ce("div", { style: { paddingTop:"1rem", textAlign:"center" } },
      ce("div", { className:"jb", style: { fontSize:64, marginBottom:10, display:"inline-block" } }, medal),
      ce("h1", { style: { fontSize:22, fontWeight:700, margin:"0 0 6px", color:C.text } }, "Julius on vaba! рҹҺҠ"),
      ce(Julius, { mood:"excited", msg:"VABA! LГ•PUKS VABA! 100 aastat ootamist ja SINA vabastasid mind! " + vmsg + " Tausend Dank! рҹҺҠрҹ‘»" }),
      ce("div", { style: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 } }, vCards),
      ce("div", { style: { background:C.bgSec, borderRadius:10, padding:"14px", marginBottom:20 } },
        ce("p", { style: { margin:0, color:C.textSec, fontSize:12 } }, "Kokku"),
        ce("p", { style: { margin:"4px 0 0", fontSize:26, fontWeight:700, color:C.text } }, total+"/"+max+" punkti ("+vpct+"%)")
      ),
      ce("button", {
        onClick: restart,
        style: { background:C.bg, color:C.text, border:"1px solid "+C.borderSec, borderRadius:10, padding:"13px 28px", fontSize:15, fontWeight:600, cursor:"pointer" }
      }, "MГӨngi uuesti рҹ”„")
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(ce(App));
</script>
</body>
</html>
